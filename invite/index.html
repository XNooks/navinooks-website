<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join NaviNooks - AI Travel Planner</title>
<meta name="description" content="Your friend invited you to NaviNooks! Plan amazing trips with AI and get a free itinerary credit.">
<meta property="og:title" content="You're invited to NaviNooks!">
<meta property="og:description" content="Plan amazing trips with AI. Get a free itinerary credit when you join.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://navinooks.com/invite/">
<meta name="apple-itunes-app" content="app-id=YOUR_APP_ID">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1A1A1A; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #2C2C2E; border-radius: 20px; padding: 40px 32px; max-width: 400px; width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.08); }
  .logo { width: 80px; height: 80px; margin: 0 auto 20px; border-radius: 20px; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  .invite-msg { color: #B0B3B8; font-size: 15px; margin-bottom: 24px; line-height: 1.5; }
  .invite-msg strong { color: #4ECDC4; }
  .reward { background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); border-radius: 12px; padding: 14px; margin-bottom: 24px; }
  .reward-text { color: #A5B4FC; font-size: 14px; }
  .reward-value { color: #6366F1; font-size: 18px; font-weight: 700; margin-top: 4px; }
  .btn { display: block; width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; text-decoration: none; margin-bottom: 10px; cursor: pointer; border: none; }
  .btn-primary { background: #4ECDC4; color: #1A1A1A; }
  .btn-secondary { background: #3A3A3C; color: #fff; }
  .btn:hover { opacity: 0.9; }
  .code { font-family: monospace; font-size: 20px; letter-spacing: 4px; color: #6366F1; font-weight: 800; margin: 10px 0; }
  .footer { margin-top: 20px; color: #8E8E93; font-size: 12px; }
  .footer a { color: #4ECDC4; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <img src="https://navinooks.com/logo.png" alt="NaviNooks" class="logo" onerror="this.style.display='none'">
  <h1>You're Invited!</h1>
  <p class="invite-msg" id="msg">A friend invited you to <strong>NaviNooks</strong> — the AI-powered travel planner.</p>

  <div class="reward">
    <div class="reward-text">Sign up and you both get</div>
    <div class="reward-value">1 Free Itinerary Credit</div>
  </div>

  <div id="code-section" style="display:none; margin-bottom: 20px;">
    <div style="color: #8E8E93; font-size: 12px;">Your referral code</div>
    <div class="code" id="code-display"></div>
  </div>

  <a class="btn btn-primary" id="btn-open" href="#">Open NaviNooks</a>
  <a class="btn btn-secondary" id="btn-ios" href="https://apps.apple.com/search?term=navinooks">Download for iOS</a>
  <a class="btn btn-secondary" id="btn-android" href="https://play.google.com/store/search?q=navinooks">Download for Android</a>
</div>

<div class="footer">
  <a href="https://navinooks.com">navinooks.com</a>
</div>

<script>
(function() {
  // Extract code from URL path: /invite/CODE
  var path = window.location.pathname;
  var parts = path.split('/');
  var code = '';
  for (var i = 0; i < parts.length; i++) {
    if (parts[i] === 'invite' && parts[i+1]) {
      code = parts[i+1].toUpperCase();
      break;
    }
  }

  if (code) {
    // Show code
    document.getElementById('code-section').style.display = 'block';
    document.getElementById('code-display').textContent = code;

    // Set deep link
    var deepLink = 'navinook://invite/' + code;
    var webLink = 'https://navinooks.com/invite/' + code;
    document.getElementById('btn-open').href = deepLink;

    // Try to open app immediately
    setTimeout(function() {
      window.location.href = deepLink;
    }, 500);
  }

  // Detect platform for store buttons
  var ua = navigator.userAgent.toLowerCase();
  if (/iphone|ipad|ipod/.test(ua)) {
    document.getElementById('btn-android').style.display = 'none';
  } else if (/android/.test(ua)) {
    document.getElementById('btn-ios').style.display = 'none';
  }
})();
</script>
</body>
</html>
