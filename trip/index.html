<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0A0A0F;
    color: #FAFAFA;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
  }
  .logo {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    margin-bottom: 24px;
    border: 2px solid rgba(255,255,255,0.1);
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #FFFFFF 0%, #4ECDC4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p {
    font-size: 16px;
    color: #8B91B5;
    max-width: 400px;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #6366F1, #4F46E5);
    color: white;
    padding: 14px 32px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(99,102,241,0.4);
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(99,102,241,0.5);
  }
  .btn-secondary {
    display: inline-block;
    margin-top: 16px;
    color: #60A5FA;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
  }
  .btn-secondary:hover { text-decoration: underline; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(78,205,196,0.12);
    border: 1px solid rgba(78,205,196,0.25);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: #4ECDC4;
    margin-bottom: 24px;
  }
  .features {
    display: flex;
    gap: 16px;
    margin-top: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .feature {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 13px;
    color: #8B91B5;
  }
  .feature strong { color: #FAFAFA; display: block; margin-bottom: 4px; }
